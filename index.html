<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>二人の夢リスト</title>
  <style>
    body { font-family: sans-serif; background: #fdf6f0; color: #4a4a4a; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #d4a373; }
    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .menu { text-align: center; margin-bottom: 20px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; background: #d4a373; color: white; }
    .hidden { display: none; }
    input, select { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>✨ 二人の夢リスト ✨</h1>
  
  <div class="menu">
    <button onclick="showSection('list')">一覧を見る</button>
    <button onclick="showSection('input')">新規入力する</button>
  </div>

  <div id="list-section">
    <div id="app">読み込み中...</div>
  </div>

  <div id="input-section" class="hidden">
    <div class="card">
      <label>カテゴリ</label>
      <select id="category" onchange="checkOther(this)">
        <option value="食">食</option>
        <option value="場所">場所</option>
        <option value="したいこと">したいこと</option>
        <option value="欲しいもの">欲しいもの</option>
        <option value="その他">新規追加（その他）</option>
      </select>
      <input type="text" id="otherCategory" class="hidden" placeholder="新しいカテゴリ名を入力">
      <input type="text" id="title" placeholder="タイトル (必須)">
      <input type="number" id="rating" placeholder="行きたい度 (1-5)" min="1" max="5">
      <button onclick="registerData()">登録する</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzGnGqltfuvz-Z49Ni-3XCxErJo7g4i5z_Xjaqw_pRUjB4Jr9SIfGrOpi0YlW12RUGw/exec';

    function showSection(section) {
      document.getElementById('list-section').style.display = (section === 'list') ? 'block' : 'none';
      document.getElementById('input-section').style.display = (section === 'input') ? 'block' : 'none';
    }

    function checkOther(select) {
      const otherInput = document.getElementById('otherCategory');
      otherInput.className = (select.value === 'その他') ? '' : 'hidden';
    }

    function registerData() {
      const catSelect = document.getElementById('category').value;
      const data = {
        category: (catSelect === 'その他') ? document.getElementById('otherCategory').value : catSelect,
        title: document.getElementById('title').value,
        rating: document.getElementById('rating').value
      };
      
      if(!data.title) { alert('タイトルを入力してください'); return; }

      fetch(API_URL, { method: 'POST', body: JSON.stringify(data) })
        .then(() => { alert('登録しました！'); location.reload(); });
    }

    const password = prompt("二人だけの合言葉を入力してね");
    if (password === "ぱんなこった") {
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          document.getElementById('app').innerHTML = data.map(item => `
            <div class="card">
              <h3>${item['タイトル'] || '無題'} (${item['カテゴリ'] || '未分類'})</h3>
              <p>行きたい度: ${'★'.repeat(item['行きたい度'] || 0)}</p>
            </div>
          `).join('');
        });
    } else {
      document.body.innerHTML = "<h1>アクセスできません</h1>";
    }
  </script>
</body>
</html>
