<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ふたりの夢リスト</title>
  <style>
    body { font-family: sans-serif; background: #fdf6f0; color: #4a4a4a; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #d4a373; margin-bottom: 10px; }
    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
    .menu, .filter-menu { text-align: center; margin-bottom: 15px; }
    button { padding: 8px 15px; margin: 3px; cursor: pointer; border-radius: 5px; border: none; background: #d4a373; color: white; font-size: 14px; }
    .btn-achieve { background: #ffb703; color: #000; font-weight: bold; }
    .btn-delete { background: #ff6b6b; font-size: 11px; }
    .btn-filter { background: #e9edc9; color: #4a4a4a; font-size: 12px; }
    .btn-filter.active { background: #ccd5ae; font-weight: bold; }
    .hidden { display: none; }
    input, select { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
    .tag { font-size: 12px; color: #999; }
    .heart { color: #ff4d6d; }
  </style>
</head>
<body>
  <h1>✨ ふたりの夢リスト ✨</h1>
  
  <div class="menu">
    <button onclick="showSection('list')">夢を見る</button>
    <button onclick="showSection('done')">かなえた思い出</button>
    <button onclick="showSection('input')">新しい夢を入力</button>
  </div>

  <div id="filter-area" class="filter-menu hidden">
    <button class="btn-filter active" onclick="setFilter('全部')">全部</button>
    <button class="btn-filter" onclick="setFilter('食')">食</button>
    <button class="btn-filter" onclick="setFilter('場所')">場所</button>
    <button class="btn-filter" onclick="setFilter('したいこと')">したいこと</button>
    <button class="btn-filter" onclick="setFilter('欲しいもの')">欲しいもの</button>
  </div>

  <div id="list-section">
    <div id="app">読み込み中...</div>
  </div>

  <div id="input-section" class="hidden">
    <div class="card">
      <h3>新しい夢を入力</h3>
      <select id="category" onchange="checkOther(this)">
        <option value="食">食</option><option value="場所">場所</option>
        <option value="したいこと">したいこと</option><option value="欲しいもの">欲しいもの</option>
        <option value="その他">その他（新規入力）</option>
      </select>
      <input type="text" id="otherCategory" class="hidden" placeholder="新しいカテゴリ名">
      <input type="text" id="title" placeholder="なにをする？ (必須)">
      <label>かなえたい度</label>
      <select id="rating">
        <option value="1">♡</option><option value="2">♡♡</option><option value="3">♡♡♡</option>
        <option value="4">♡♡♡♡</option><option value="5">♡♡♡♡♡</option>
      </select>
      <button onclick="registerData()">登録する</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzGnGqltfuvz-Z49Ni-3XCxErJo7g4i5z_Xjaqw_pRUjB4Jr9SIfGrOpi0YlW12RUGw/exec';
    let allData = [];
    let currentMode = 'list';
    let currentFilter = '全部';

    function showSection(section) {
      currentMode = (section === 'done') ? 'done' : 'list';
      document.getElementById('list-section').className = (section === 'input') ? 'hidden' : '';
      document.getElementById('input-section').className = (section === 'input') ? '' : 'hidden';
      document.getElementById('filter-area').className = (section === 'list') ? 'filter-menu' : 'hidden';
      if(section !== 'input') renderList();
    }

    function setFilter(cat) {
      currentFilter = cat;
      document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderList();
    }

    function checkOther(select) { document.getElementById('otherCategory').className = (select.value === 'その他') ? '' : 'hidden'; }

    function loadData() {
      fetch(API_URL).then(res => res.json()).then(data => {
        allData = data;
        renderList();
      });
    }

    function renderList() {
      const app = document.getElementById('app');
      const filtered = allData.filter(item => {
        const isStatusMatch = (currentMode === 'done') ? item['ステータス'] === 'かなえた' : item['ステータス'] !== 'かなえた';
        const isCatMatch = (currentFilter === '全部' || item['カテゴリ'] === currentFilter);
        return isStatusMatch && isCatMatch;
      });

      app.innerHTML = filtered.length === 0 ? "<p style='text-align:center;'>まだ何もないよ</p>" : filtered.reverse().map(item => `
        <div class="card">
          <span class="tag">[${item['カテゴリ']}]</span>
          <h3>${item['What'] || '無題'}</h3>
          <p>かなえたい度: <span class="heart">${'♡'.repeat(item['行きたい度'] || 0)}</span></p>
          ${currentMode === 'list' ? `<button class="btn-achieve" onclick="actionData('achieve', ${item.rowIndex})">かなえた！</button>` : '🎉 達成済み！'}
          <button class="btn-delete" onclick="actionData('delete', ${item.rowIndex})">削除</button>
        </div>`).join('');
    }

    function actionData(action, rowIndex) {
      if (!confirm('実行しますか？')) return;
      fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: action, rowIndex: rowIndex }) })
        .then(() => loadData());
    }

    function registerData() {
      const catSelect = document.getElementById('category').value;
      const data = {
        category: (catSelect === 'その他') ? document.getElementById('otherCategory').value : catSelect,
        title: document.getElementById('title').value,
        rating: document.getElementById('rating').value
      };
      if(!data.title) return alert('タイトルを入力してね');
      fetch(API_URL, { method: 'POST', body: JSON.stringify(data) }).then(() => {
        alert('登録したよ！');
        location.reload();
      });
    }

    let auth = sessionStorage.getItem('auth');
    if (!auth) {
      auth = prompt("合言葉を教えてね");
      if (auth === "ぱんなこった") {
        sessionStorage.setItem('auth', auth);
        loadData();
      } else { document.body.innerHTML = "<h1>アクセスできません</h1>"; }
    } else { loadData(); }
  </script>
</body>
</html>
