<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふたりの夢リスト</title>
  <style>
    /* スマホで見やすいフォントサイズと中央配置 */
    body { font-family: sans-serif; background: #fdf6f0; color: #4a4a4a; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    
    /* コンテナの幅をスマホに合わせて制限 */
    #main-container { width: 100%; max-width: 500px; }
    
    h1 { text-align: center; color: #d4a373; font-size: 24px; margin-bottom: 20px; }
    
    .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .menu, .filter-menu { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; flex-wrap: wrap; }
    
    button { padding: 12px 20px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background: #d4a373; color: white; font-size: 16px; font-weight: bold; }
    
    .btn-achieve { background: #ffb703; color: #000; }
    .btn-delete { background: #ff6b6b; font-size: 14px; }
    .btn-edit { background: #a8dadc; color: #1d3557; font-size: 14px; }
    .btn-url { background: #457b9d; font-size: 14px; width: 100%; margin-top: 10px; }
    
    .btn-filter { background: #e9edc9; color: #4a4a4a; font-size: 14px; }
    .btn-filter.active { background: #ccd5ae; font-weight: bold; }
    
    .hidden { display: none; }
    
    input, select, textarea { display: block; width: 100%; margin: 15px 0; padding: 15px; box-sizing: border-box; border: 2px solid #eee; border-radius: 10px; font-size: 16px; }
    
    .tag { font-size: 14px; color: #999; }
    h3 { font-size: 20px; margin: 10px 0; }
    .heart { color: #ff4d6d; font-size: 20px; }
    .memo-text { font-size: 16px; color: #555; background: #f9f9f9; padding: 12px; border-radius: 10px; margin: 10px 0; border-left: 5px solid #d4a373; }
  </style>
</head>
<body>
  <div id="main-container">
    <h1>✨ ふたりの夢リスト ✨</h1>
    
    <div class="menu">
      <button onclick="showSection('list')">夢を見る</button>
      <button onclick="showSection('done')">かなえた思い出</button>
      <button onclick="showSection('input')">新しい夢を入力</button>
    </div>

    <div id="filter-area" class="filter-menu hidden">
      <button class="btn-filter active" onclick="setFilter('全部')">全部</button>
      <button class="btn-filter" onclick="setFilter('食')">食</button>
      <button class="btn-filter" onclick="setFilter('場所')">場所</button>
      <button class="btn-filter" onclick="setFilter('したいこと')">したいこと</button>
      <button class="btn-filter" onclick="setFilter('欲しいもの')">欲しいもの</button>
    </div>

    <div id="list-section">
      <div id="app">読み込み中...</div>
    </div>

    <div id="input-section" class="hidden">
      <div class="card">
        <h3 id="form-title">新しい夢を入力</h3>
        <select id="category">
          <option value="食">食</option><option value="場所">場所</option>
          <option value="したいこと">したいこと</option><option value="欲しいもの">欲しいもの</option>
        </select>
        <input type="text" id="title" placeholder="なにをする？ (必須)">
        <input type="url" id="url" placeholder="参考URL">
        <textarea id="memo" placeholder="ふたりのメモ" rows="3"></textarea>
        <select id="rating">
          <option value="1">♡</option><option value="2">♡♡</option><option value="3">♡♡♡</option>
          <option value="4">♡♡♡♡</option><option value="5">♡♡♡♡♡</option>
        </select>
        <button onclick="registerData()" id="reg-btn" style="width:100%; padding:15px;">登録する</button>
      </div>
    </div>
  </div>

  <script>
    // ... スクリプト部分は以前と同じです。省略して記載します ...
    const API_URL = 'https://script.google.com/macros/s/AKfycbzGnGqltfuvz-Z49Ni-3XCxErJo7g4i5z_Xjaqw_pRUjB4Jr9SIfGrOpi0YlW12RUGw/exec';
    // ... (以下、renderListなどのロジックは先ほどのものを使用) ...
    // ※貼り付け時は省略せず、renderList等の関数も含めて貼り付けてください
  </script>
</body>
</html>
